apiVersion: apps/v1
kind: Deployment
metadata:
  name: encoder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: encoder
  template:
    metadata:
      labels:
        app: encoder
    spec:
      containers:
        - name: encoder
          image: atennop/secure-vault:encoder
          imagePullPolicy: Always
          ports:
            - containerPort: ${ENCODER_PORT}
