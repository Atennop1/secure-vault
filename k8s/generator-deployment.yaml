apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      containers:
        - name: generator
          image: atennop/secure-vault:generator
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: ${GENERATOR_PORT}
