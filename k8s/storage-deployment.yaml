apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
        - name: storage
          image: vault-storage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: ${STORAGE_PORT}
